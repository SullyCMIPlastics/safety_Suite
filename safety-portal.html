<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMI Safety Portal</title>
<style>
:root {
  --navy:#0F2137; --navy-mid:#1A3350; --navy-light:#243D5E;
  --amber:#F5A623; --amber-dark:#D4901E;
  --bg:#EEF1F6; --surface:#FFFFFF; --border:#D4DAE4;
  --text:#0F2137; --text-mid:#4A5568; --text-muted:#8896AB;
  --green:#16A34A; --red:#DC2626; --orange:#EA580C; --blue:#2563EB;
  --sidebar-w:248px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sidebar-w);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo-wrap{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo-co{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:2px}
.logo-title{font-size:21px;font-weight:800;color:#fff;line-height:1.1}
.logo-title span{color:var(--amber)}
.nav-sect{padding:10px 0 2px}
.nav-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:0 18px 5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;color:rgba(255,255,255,.6);font-size:13.5px;font-weight:500;border-left:3px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-item.active{background:rgba(245,166,35,.13);color:var(--amber);border-left-color:var(--amber)}
.nav-icon{font-size:15px;width:22px;text-align:center}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:58px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:14px;flex-shrink:0}
.topbar-title{font-size:17px;font-weight:800;color:var(--text);flex:1}
.btn{padding:8px 18px;border-radius:6px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--amber);color:var(--navy)}
.btn-primary:hover{background:var(--amber-dark)}
.btn-secondary{background:var(--bg);color:var(--text-mid);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 9px;font-size:11px;font-weight:600}
#content{flex:1;overflow-y:auto;padding:26px 28px}
.card{background:var(--surface);border-radius:10px;border:1px solid var(--border);padding:20px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:14px;font-weight:700;color:var(--text)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--surface);border-radius:10px;border:1px solid var(--border);padding:18px 20px}
.kpi-val{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.kpi-lbl{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-top:6px}
.kpi-sub{font-size:11px;color:var(--text-muted);margin-top:4px}
.kpi.red{border-left:4px solid var(--red)}
.kpi.amber{border-left:4px solid var(--orange)}
.kpi.green{border-left:4px solid var(--green)}
.kpi.blue{border-left:4px solid var(--blue)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 14px;background:var(--bg);color:var(--text-muted);font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFD}
.tbl-wrap{overflow-x:auto}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.02em;white-space:nowrap}
.badge-red{background:#FEE2E2;color:#991B1B}
.badge-amber{background:#FEF3C7;color:#92400E}
.badge-green{background:#D1FAE5;color:#065F46}
.badge-blue{background:#DBEAFE;color:#1E40AF}
.badge-grey{background:#F3F4F6;color:#4B5563}
.badge-purple{background:#EDE9FE;color:#5B21B6}
.badge-orange{background:#FFEDD5;color:#9A3412}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
input:not([type=radio]):not([type=checkbox]),select,textarea{padding:9px 12px;border-radius:6px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;color:var(--text);background:var(--surface);transition:border-color .15s;width:100%}
input[type=radio],input[type=checkbox]{width:auto;padding:0}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,166,35,.12)}
textarea{resize:vertical;min-height:80px}
.sec-title{font-size:22px;font-weight:800;margin-bottom:4px}
.sec-sub{font-size:13px;color:var(--text-muted);margin-bottom:22px}
.filters{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.srch{flex:1;min-width:180px;padding:8px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;color:var(--text)}
.srch:focus{outline:none;border-color:var(--amber)}
.dash-row{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:18px}
.act-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.act-item:last-child{border-bottom:none}
.act-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.act-dot.red{background:var(--red)}
.act-dot.amber{background:var(--orange)}
.act-dot.green{background:var(--green)}
.act-dot.blue{background:var(--blue)}
.act-text{font-size:13px;font-weight:500}
.act-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
.training-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.tr-card{background:var(--surface);border-radius:10px;border:1px solid var(--border);padding:18px;cursor:pointer;transition:all .15s}
.tr-card:hover{border-color:var(--amber);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.08)}
.tr-icon{font-size:26px;margin-bottom:10px}
.tr-title{font-size:14px;font-weight:700;margin-bottom:5px}
.tr-desc{font-size:12px;color:var(--text-muted);line-height:1.5}
.prog-item{background:var(--surface);border-radius:10px;border:1px solid var(--border);padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.prog-item:hover{border-color:var(--amber)}
.prog-icon{font-size:22px;width:46px;height:46px;background:var(--bg);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prog-info{flex:1}
.prog-title{font-size:14px;font-weight:700;margin-bottom:2px}
.prog-meta{font-size:12px;color:var(--text-muted)}
.chk-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.chk-item:last-child{border-bottom:none}
.chk-item input[type=checkbox]{width:15px;height:15px;margin-top:2px;accent-color:var(--amber);cursor:pointer;flex-shrink:0}
.chk-lbl{flex:1;font-size:13.5px}
.chk-na{font-size:11px;color:var(--text-muted);cursor:pointer}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--surface);border-radius:12px;max-width:720px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-hd{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-hd h3{font-size:16px;font-weight:800}
.modal-body{padding:22px}
.modal-ft{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.close-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-muted);line-height:1}
.close-x:hover{color:var(--text)}
.empty{text-align:center;padding:48px 24px;color:var(--text-muted)}
.empty .e-icon{font-size:38px;margin-bottom:10px}
.empty h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px}
.empty p{font-size:13px}
.sev-bar{width:4px;border-radius:2px;align-self:stretch;flex-shrink:0}
.sev-bar.critical{background:var(--red)}
.sev-bar.serious{background:var(--orange)}
.sev-bar.minor{background:var(--blue)}
.sev-bar.nearmiss{background:var(--green)}
.mini-bars{display:flex;align-items:flex-end;gap:3px;height:52px}
.bar{flex:1;border-radius:3px 3px 0 0;background:var(--amber);min-height:3px;opacity:.8;transition:opacity .15s}
.bar:hover{opacity:1}
.bar.nm{background:var(--green)}
.contact-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.con-card{background:var(--surface);border-radius:10px;border:1px solid var(--border);padding:18px}
.con-name{font-size:15px;font-weight:700;margin-bottom:4px}
.con-role{font-size:12px;color:var(--text-muted);margin-bottom:10px}
.con-row{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:4px}
.divider{height:1px;background:var(--border);margin:20px 0}
.osha-hd{background:var(--navy);color:#fff;padding:14px 20px;border-radius:8px 8px 0 0}
.osha-hd h2{font-size:15px;font-weight:800}
.osha-hd p{font-size:11px;opacity:.7;margin-top:3px}
.osha-sect{background:var(--surface);border:1px solid var(--border);border-top:none;padding:16px 20px}
.osha-sect:last-child{border-radius:0 0 8px 8px}
.osha-stitle{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);margin-bottom:12px;padding-bottom:5px;border-bottom:2px solid var(--navy)}
.osha-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px}
.osha-field label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px}
.osha-field p{font-size:13px;font-weight:500;padding:7px 10px;background:var(--bg);border-radius:5px;min-height:32px}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tab-row{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:22px}
.tab{padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--amber);border-bottom-color:var(--amber)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.dash-row{grid-template-columns:1fr}.training-grid{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}}
@media print{
  #sidebar,#topbar,.btn,.filters,#topbar-actions{display:none!important}
  #main{overflow:visible}
  #content{overflow:visible;padding:8px}
  body{background:#fff}
  .card{border:none;padding:0;box-shadow:none}
  input,select,textarea{border:1px solid #ccc!important;background:#fff!important}
  .sec-title,.sec-sub{display:none}
  .print-hide{display:none!important}
  @page{margin:18mm 14mm;size:A4}
}
</style>
</head>
<body>

<nav id="sidebar">
  <div class="logo-wrap">
    <div class="logo-co">CMI Plastics</div>
    <div class="logo-title">Safety<span>Portal</span></div>
  </div>
  <div class="nav-sect">
    <div class="nav-lbl">Overview</div>
    <div class="nav-item active" onclick="nav('dashboard')"><span class="nav-icon">⊞</span> Dashboard</div>
  </div>
  <div class="nav-sect">
    <div class="nav-lbl">Incidents</div>
    <div class="nav-item" onclick="nav('report')"><span class="nav-icon">✚</span> Report Incident</div>
    <div class="nav-item" onclick="nav('incidents')"><span class="nav-icon">☰</span> Incident Log <span class="nav-badge" id="badge-open">0</span></div>
    <div class="nav-item" onclick="nav('osha')"><span class="nav-icon">📋</span> OSHA Reports</div>
    <div class="nav-item" onclick="nav('corrective')"><span class="nav-icon">✓</span> Corrective Actions</div>
  </div>
  <div class="nav-sect">
    <div class="nav-lbl">Programs</div>
    <div class="nav-item" onclick="nav('investigations')"><span class="nav-icon">🔎</span> Investigations</div>
    <div class="nav-item" onclick="nav('inspections')"><span class="nav-icon">🔍</span> Inspections</div>
    <div class="nav-item" onclick="nav('training')"><span class="nav-icon">🎓</span> Training Library</div>
    <div class="nav-item" onclick="nav('programs')"><span class="nav-icon">📁</span> Safety Programs</div>
  </div>
  <div class="nav-sect">
    <div class="nav-lbl">Resources</div>
    <div class="nav-item" onclick="nav('contacts')"><span class="nav-icon">📞</span> Emergency Contacts</div>
  </div>
</nav>

<div id="main">
  <header id="topbar">
    <div class="topbar-title" id="page-title">Dashboard</div>
    <div id="topbar-actions"></div>
  </header>
  <div id="content"></div>
</div>

<script>
// ─── Data layer ───────────────────────────────────────────────────────────────
const STORE = {
  get(k){ try{return JSON.parse(localStorage.getItem('cmi_'+k)||'null')}catch{return null} },
  set(k,v){ localStorage.setItem('cmi_'+k, JSON.stringify(v)) }
};

let incidents = STORE.get('incidents') || [
  {id:'INC-001',date:'2026-06-10',time:'08:30',type:'Near Miss',severity:'serious',dept:'Extrusion',location:'Line 3',description:'Operator slipped on hydraulic fluid leak near press #3. No injury sustained. Floor was wet from overnight maintenance that was not properly cleaned up.',injuredName:'',treatment:'',lostDays:0,witnesses:'Marcus D., Tonya R.',rootCause:'Inadequate post-maintenance housekeeping procedure',immediate:'Fluid cleaned, area barricaded. Maintenance notified.',status:'Open',reportedBy:'Jamal K.',osha:false,photos:[]},
  {id:'INC-002',date:'2026-06-15',time:'13:45',type:'First Aid',severity:'minor',dept:'Assembly',location:'Packaging Area',description:'Employee sustained a 1-inch laceration on right index finger while using a box cutter. Bandaged on-site, returned to work.',injuredName:'Sandra M.',treatment:'First aid — bandage applied by safety coordinator.',lostDays:0,witnesses:'Donna L.',rootCause:'Box cutter used without cut-resistant gloves. PPE not enforced at station.',immediate:'Wound cleaned and bandaged. PPE requirement posted at station.',status:'Closed',reportedBy:'Tom H.',osha:false,photos:[]},
  {id:'INC-003',date:'2026-06-18',time:'10:15',type:'Recordable Injury',severity:'serious',dept:'Maintenance',location:'Utility Room B',description:'Maintenance tech received an electrical shock while replacing a breaker panel cover with power not locked out. Transported to urgent care; released same day.',injuredName:'Darrell F.',treatment:'Urgent care — cardiac monitoring, cleared for return to duty.',lostDays:1,witnesses:'Pete J.',rootCause:'LOTO procedure not followed. Energy not verified de-energized before panel removal.',immediate:'Work stopped. LOTO training re-briefed to maintenance team.',status:'Under Review',reportedBy:'Darrell F.',osha:true,photos:[]},
  {id:'INC-004',date:'2026-06-22',time:'07:00',type:'Near Miss',severity:'minor',dept:'Shipping',location:'Loading Dock 2',description:'Forklift operator noticed a pedestrian stepped into the forklift travel lane without checking. No contact made. Pedestrian was a new hire in week one.',injuredName:'',treatment:'',lostDays:0,witnesses:'Ray B.',rootCause:'New hire not yet trained on floor traffic zones.',immediate:'Pedestrian reminded of floor markings. Supervisor notified.',status:'Closed',reportedBy:'Carlos V.',osha:false,photos:[]},
];

let corrective = STORE.get('corrective') || [
  {id:'CA-001',incidentId:'INC-001',desc:'Implement post-maintenance cleanup checklist for all fluid systems',assignedTo:'Maintenance Supervisor',due:'2026-07-05',priority:'High',status:'In Progress',notes:'Checklist drafted, pending approval.'},
  {id:'CA-002',incidentId:'INC-001',desc:'Install absorbent mats under hydraulic press #3 permanently',assignedTo:'Facilities',due:'2026-07-10',priority:'Medium',status:'Open',notes:''},
  {id:'CA-003',incidentId:'INC-002',desc:'Enforce cut-resistant glove policy in packaging — add to daily checklist',assignedTo:'Packaging Supervisor',due:'2026-06-28',priority:'High',status:'Closed',notes:'Policy posted and verified at station 6/28.'},
  {id:'CA-004',incidentId:'INC-003',desc:'Conduct LOTO re-training for all maintenance personnel',assignedTo:'Safety Manager',due:'2026-06-30',priority:'Critical',status:'In Progress',notes:'Training scheduled 6/30 at 7am.'},
  {id:'CA-005',incidentId:'INC-003',desc:'Audit all electrical panels for LOTO compliance',assignedTo:'Maintenance Lead',due:'2026-07-15',priority:'High',status:'Open',notes:''},
  {id:'CA-006',incidentId:'INC-004',desc:'Complete new hire safety orientation — floor traffic & forklift zones',assignedTo:'HR / Safety',due:'2026-06-25',priority:'Medium',status:'Closed',notes:'Completed 6/25.'},
];

let inspections = STORE.get('inspections') || [
  {id:'INSP-001',type:'Weekly Safety Walk',date:'2026-06-23',conductedBy:'Safety Manager',area:'Production Floor',status:'Completed',findings:2,items:[
    {q:'All aisles and exits clear of obstructions?',a:'yes'},{q:'Emergency eyewash stations tested and functioning?',a:'yes'},
    {q:'Fire extinguishers accessible and inspection tags current?',a:'no',note:'Ext. #4 tag expired — scheduled for service'},
    {q:'All machine guards in place and secured?',a:'yes'},{q:'Spill kits stocked and accessible?',a:'yes'},
    {q:'Proper PPE in use in all required zones?',a:'yes'},{q:'First aid kit stocked and accessible?',a:'yes'},
    {q:'Forklift charging area free of combustibles?',a:'no',note:'Cardboard boxes stored too close — removed during inspection'},
  ]},
];

let caIdCounter = corrective.length + 1;
let incIdCounter = incidents.length + 1;
let inspIdCounter = inspections.length + 1;

function save(){ STORE.set('incidents',incidents); STORE.set('corrective',corrective); STORE.set('inspections',inspections); }

// ─── Router ───────────────────────────────────────────────────────────────────
let currentView = 'dashboard';
function nav(view){
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.getAttribute('onclick')===`nav('${view}')`);
  });
  updateBadge();
  render();
}
function updateBadge(){
  const open = incidents.filter(i=>i.status==='Open'||i.status==='Under Review').length;
  document.getElementById('badge-open').textContent = open;
  document.getElementById('badge-open').style.display = open ? 'inline' : 'none';
}

// ─── Render dispatcher ────────────────────────────────────────────────────────
function render(){
  const views = {dashboard:renderDashboard,report:renderReport,incidents:renderIncidents,
    osha:renderOSHA,corrective:renderCorrective,investigations:renderInvestigations,
    inspections:renderInspections,training:renderTraining,programs:renderPrograms,contacts:renderContacts};
  const titles = {dashboard:'Dashboard',report:'Report an Incident',incidents:'Incident Log',
    osha:'OSHA Reports',corrective:'Corrective Actions',investigations:'Accident & Injury Investigations',
    inspections:'Inspections',training:'Training Library',programs:'Safety Programs',contacts:'Emergency Contacts'};
  document.getElementById('page-title').textContent = titles[currentView]||'';
  const actions = {
    incidents:`<button class="btn btn-primary btn-sm" onclick="nav('report')">✚ New Report</button>`,
    corrective:`<button class="btn btn-primary btn-sm" onclick="openCAModal()">✚ Add Action</button>`,
    inspections:`<button class="btn btn-primary btn-sm" onclick="newInspection()">✚ New Inspection</button>`,
    investigations:`<button class="btn btn-primary btn-sm" onclick="newInvestigation()">✚ New Investigation</button>`,
    training:`<button class="btn btn-primary btn-sm" onclick="addTraining()">✚ Add Material</button>`,
  };
  document.getElementById('topbar-actions').innerHTML = actions[currentView]||'';
  (views[currentView]||renderDashboard)();
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function renderDashboard(){
  const now = new Date(); const m = now.getMonth(); const y = now.getFullYear();
  const mtd = incidents.filter(i=>{ const d=new Date(i.date); return d.getMonth()===m&&d.getFullYear()===y; });
  const nm = mtd.filter(i=>i.type==='Near Miss').length;
  const rec = mtd.filter(i=>i.type==='Recordable Injury'||i.type==='Lost Time Injury').length;
  const openCA = corrective.filter(c=>c.status==='Open'||c.status==='In Progress').length;
  const overdue = corrective.filter(c=>c.status!=='Closed'&&new Date(c.due)<now).length;

  // Monthly bars last 6 months
  const months = [];
  for(let i=5;i>=0;i--){
    const d=new Date(y,m-i,1);
    const mo=d.getMonth(); const yr=d.getFullYear();
    const count=incidents.filter(x=>{const dd=new Date(x.date);return dd.getMonth()===mo&&dd.getFullYear()===yr;}).length;
    months.push({label:d.toLocaleString('default',{month:'short'}),count,nm:incidents.filter(x=>{const dd=new Date(x.date);return dd.getMonth()===mo&&dd.getFullYear()===yr&&x.type==='Near Miss';}).length});
  }
  const maxCount = Math.max(...months.map(x=>x.count),1);

  const recent = [...incidents].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);

          ${months.map(m=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">

              <div class="bar" style="width:100%;height:${m.count?Math.max(10,(m.count/maxCount)*58):3}px"></div>
              ${m.nm?`<div class="bar nm" style="width:100%;height:${Math.max(5,(m.nm/maxCount)*30)}px"></div>`:''}
            </div>
            <div style="font-size:10px;color:var(--text-muted);font-weight:600">${m.label}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-hd"><span class="card-title">By Severity</span></div>
      ${['Critical','Serious','Minor','Near Miss'].map(s=>{

        const pct = incidents.length ? Math.round(cnt/incidents.length*100) : 0;

        return `<div style="margin-bottom:10px">

function printIncidentForm(){
  const prevTitle = document.title;
  document.title = 'CMI Plastics — Incident Report';
  window.print();
  document.title = prevTitle;
}

function toggleMedical(){
  const val = document.querySelector('input[name="treatmentRendered"]:checked')?.value;
  const detail = document.getElementById('medical-detail');
  const noNote = document.getElementById('no-treatment-note');
  if(val==='yes'){
    detail.style.display='flex';
    noNote.style.display='none';
  } else if(val==='no'){
    detail.style.display='none';
    noNote.style.display='block';
  }
}

function toggleTransport(){
  const val = document.querySelector('input[name="emergencyContacted"]:checked')?.value;
  const td = document.getElementById('transport-detail');
  td.style.display = val ? 'flex' : 'none';
}

function addInjured(){
  const list = document.getElementById('injured-list');
  const count = list.querySelectorAll('.injured-row').length + 1;
  const row = document.createElement('div');
  row.className = 'injured-row';
  row.style.cssText = 'display:flex;gap:8px;align-items:center';
  row.innerHTML = `<input type="text" name="injuredName" placeholder="Full name" style="flex:1">
    <button type="button" onclick="this.parentElement.remove()" class="btn btn-danger btn-sm" style="flex-shrink:0">Remove</button>`;
  list.appendChild(row);
}

function addWitness(){
  const list = document.getElementById('witness-list');
  const count = list.querySelectorAll('input').length + 1;
  const inp = document.createElement('input');
  inp.type = 'text'; inp.name = 'witness';
  inp.placeholder = `Witness ${count} — Full name`;
  list.appendChild(inp);
}

function submitIncident(e){
  e.preventDefault();
  const f = new FormData(e.target);
  const get = k => f.get(k)||'';
  const id = 'INC-' + String(incIdCounter++).padStart(3,'0');
  const injuredNames = [...e.target.querySelectorAll('input[name="injuredName"]')].map(i=>i.value).filter(Boolean).join('; ');
  const witnesses = [...e.target.querySelectorAll('input[name="witness"]')].map(i=>i.value).filter(Boolean).join(', ');
  const inc = {
    id, date:get('date'), time:get('time'), type:get('type'), severity:get('severity'),
    dept:get('dept'), location:get('location'), reportedBy:get('reportedBy'),
    injuredName:injuredNames, witnesses:witnesses,
    description:get('description'), immediate:get('immediate'),
    treatment:get('treatment'), lostDays:parseInt(get('lostDays'))||0,
    rootCause:get('rootCause'), osha:get('osha')==='true',
    status:'Open', photos:[]
  };
  incidents.unshift(inc);
  save();
  updateBadge();
  alert(`✓ Incident ${id} submitted successfully.\n\nYou will be directed to the Incident Log.`);
  nav('incidents');
}

        </tr></thead>
        <tbody id="inc-tbody"></tbody>
      </table>
    </div>
  </div>`;
  filterIncidents();

function filterIncidents(){
  const q=(document.getElementById('inc-search').value||'').toLowerCase();
  const t=document.getElementById('inc-type-filter').value;
  const s=document.getElementById('inc-status-filter').value;
  const d=document.getElementById('inc-dept-filter').value;
  const filtered = incidents.filter(i=>{
    if(t&&i.type!==t)return false;
    if(s&&i.status!==s)return false;
    if(d&&i.dept!==d)return false;
    if(q&&!(i.id+i.dept+i.location+i.type+i.reportedBy+i.description).toLowerCase().includes(q))return false;
    return true;
  });
  const sevMap={critical:'badge-red',serious:'badge-orange',minor:'badge-blue',nearmiss:'badge-green'};
  document.getElementById('inc-tbody').innerHTML = filtered.length ? filtered.map(i=>`
    <tr>
      <td><strong>${i.id}</strong></td>
      <td style="white-space:nowrap">${fmtDate(i.date)}</td>
      <td>${i.type}</td>
      <td><span class="badge ${sevMap[i.severity]||'badge-grey'}">${capitalize(i.severity)}</span></td>
      <td>${i.dept}</td>
      <td>${i.location}</td>
      <td>${i.reportedBy}</td>
      <td>${i.osha?'<span class="badge badge-red">Yes</span>':'<span class="badge badge-grey">No</span>'}</td>
      <td><span class="${badgeCls(i.status)}">${i.status}</span></td>
      <td style="white-space:nowrap">
        <button class="btn btn-secondary btn-xs" onclick='viewIncident("${i.id}")'>View</button>
        <button class="btn btn-secondary btn-xs" onclick='changeStatus("${i.id}")'>Status</button>
      </td>
    </tr>`).join('') : '<tr><td colspan="10" style="text-align:center;padding:32px;color:var(--text-muted)">No incidents match the current filters.</td></tr>';
}

function viewIncident(id){
  const i = incidents.find(x=>x.id===id); if(!i) return;
  const cas = corrective.filter(c=>c.incidentId===id);
  const sevMap={critical:'badge-red',serious:'badge-orange',minor:'badge-blue',nearmiss:'badge-green'};
  showModal(`Incident Report — ${i.id}`,`
    <div class="pill-row">
      <span class="badge ${sevMap[i.severity]||'badge-grey'}">${capitalize(i.severity)}</span>
      <span class="${badgeCls(i.status)}">${i.status}</span>
      ${i.osha?'<span class="badge badge-red">OSHA Recordable</span>':''}
    </div>
    <div class="osha-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px">
      ${[['Date',fmtDate(i.date)],['Time',i.time||'—'],['Type',i.type],['Department',i.dept],['Location',i.location],['Reported By',i.reportedBy],['Injured Person',i.injuredName||'None'],['Lost Days',i.lostDays],['Witnesses',i.witnesses||'None']].map(([l,v])=>`<div class="osha-field"><label>${l}</label><p>${v}</p></div>`).join('')}
    </div>
    <div class="divider"></div>
    <div style="margin-bottom:12px"><div class="osha-stitle">Description</div><p style="font-size:13px;line-height:1.6;color:var(--text)">${i.description}</p></div>
    <div style="margin-bottom:12px"><div class="osha-stitle">Immediate Action Taken</div><p style="font-size:13px;line-height:1.6">${i.immediate}</p></div>

function filterCA(){
  const q=(document.getElementById('ca-search').value||'').toLowerCase();
  const s=document.getElementById('ca-status-f').value;
  const p=document.getElementById('ca-pri-f').value;
  const filtered = corrective.filter(c=>{
    if(s&&c.status!==s)return false;
    if(p&&c.priority!==p)return false;
    if(q&&!(c.id+c.desc+c.assignedTo+c.incidentId).toLowerCase().includes(q))return false;
    return true;
  });
  const priCol={Critical:'badge-red',High:'badge-orange',Medium:'badge-amber',Low:'badge-grey'};
  const now = new Date();
  document.getElementById('ca-tbody').innerHTML = filtered.length ? filtered.map(c=>{
    const overdue = c.status!=='Closed' && new Date(c.due)<now;
    return `<tr>
      <td><strong>${c.id}</strong></td>
      <td><a onclick="viewIncident('${c.incidentId}')" style="color:var(--amber);cursor:pointer;text-decoration:none;font-weight:600">${c.incidentId}</a></td>
      <td style="max-width:280px">${c.desc}</td>
      <td>${c.assignedTo}</td>
      <td style="white-space:nowrap;color:${overdue?'var(--red)':'inherit'};font-weight:${overdue?700:400}">${fmtDate(c.due)}${overdue?' ⚠️':''}</td>
      <td><span class="badge ${priCol[c.priority]||'badge-grey'}">${c.priority}</span></td>
      <td><span class="${badgeCls(c.status)}">${c.status}</span></td>
      <td><button class="btn btn-secondary btn-xs" onclick="editCA('${c.id}')">Update</button></td>
    </tr>`;
  }).join('') : '<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--text-muted)">No corrective actions found.</td></tr>';
}

function editCA(id){ openCAModal(id); }

function saveCA(e, existingId){
  e.preventDefault();
  const f = new FormData(e.target);
  const data = {
    incidentId:f.get('incidentId'), priority:f.get('priority'),
    desc:f.get('desc'), assignedTo:f.get('assignedTo'),
    due:f.get('due'), status:f.get('status'), notes:f.get('notes')
  };
  if(existingId){
    const idx = corrective.findIndex(c=>c.id===existingId);
    if(idx>=0) corrective[idx] = {...corrective[idx],...data};
  } else {
    data.id = 'CA-'+String(caIdCounter++).padStart(3,'0');
    corrective.push(data);
  }
  save(); closeModal(); filterCA();
}

function saveInspection(e,id,type,date,conductedBy,area){
  e.preventDefault();
  const f = new FormData(e.target);
  const questions = INSPECTION_TYPES[type]||[];
  const items = questions.map((q,i)=>({q, a:f.get('q'+i)||'', note:f.get('note'+i)||''}));
  const findings = items.filter(x=>x.a==='no').length;
  inspections.unshift({id,type,date,conductedBy,area,status:findings>0?'Findings Noted':'Completed',findings,items});
  save(); closeModal(); renderInspections();
}

function saveTrainingRecord(e){

  STORE.set('training_records',records);

}

        ${field("Doctor's Name", inp('supDoctorName',''))}
        ${field('Hospital / Facility Name', inp('supHospitalName',''))}
        ${field('Facility Address', inp('supFacilityAddress',''))}
      </div>

      ${field('Recommended preventive action to prevent recurrence', txt('supPreventive','Describe specific corrective and preventive actions recommended…',3), true)}

      <div class="form-grid" style="margin-top:8px">
        ${field('Supervisor Signature', inp('supSignature','','Type full name as signature'))}
        ${field('Signature Date', inp('supSignDate','date'))}
        ${field('Supervisor Title / Role', inp('supTitle',''))}
      </div>
    </div>

    <!-- ══ PART 3: INCIDENT INVESTIGATION REPORT ═══════════════════ -->
    <div class="card" style="margin-bottom:18px">
      <div style="background:#1e3a5f;margin:-20px -20px 20px;padding:14px 20px;border-radius:8px 8px 0 0">
        <div style="font-size:13px;font-weight:800;color:var(--amber);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px">Part 3</div>
        <div style="font-size:17px;font-weight:800;color:#fff">Incident Investigation Report</div>
        <div style="font-size:12px;color:rgba(255,255,255,.6);margin-top:3px">CMI Form 714-010 · Complete as soon as possible after any serious injury, illness, or near miss</div>
      </div>

      ${sec('Report Classification')}
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">
        ${radio('reportType','Death')} ${radio('reportType','Lost Time')} ${radio('reportType','Dr. Visit Only')}
        ${radio('reportType','First Aid Only')} ${radio('reportType','Near Miss')}
      </div>
      <div class="form-grid" style="margin-top:14px;margin-bottom:4px">
        ${field('Date of Incident', inp('invDateEvent','date'))}
        ${field('This report is made by', sel('reportMadeBy',['','Employee','Supervisor','Team','Other']))}
        ${field('Department', sel('dept',['','Production','Warehouse','Quality','Tool Room','Engineering','Office','Facilities Maintenance','Vendor','Supplier','Guest']))}
      </div>

      ${sec('Step 1 — Injured Employee')}
      <div class="form-grid" style="margin-bottom:4px">
        ${field('Full Name', inp('inv1Name',''))}
        ${field('Gender', sel('inv1Gender',['','Male','Female','Prefer not to say']))}
        ${field('Age', inp('inv1Age','number',''))}
        ${field('Job Title at Time of Incident', inp('inv1JobTitle',''))}
        ${field('Months with This Employer', inp('inv1MonthsEmployer','number',''))}
        ${field('Months Doing This Job', inp('inv1MonthsJob','number',''))}
        ${field('Employment Type', sel('inv1EmpType',['','Regular Full Time','Regular Part Time','Seasonal','Temporary']))}
      </div>

      <div style="margin-bottom:16px">
        <label style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:10px">Nature of Injury — Check all that apply</label>
        <div style="display:flex;flex-wrap:wrap">
          ${['Abrasion / Scrapes','Amputation','Broken Bone','Bruise','Burn (Heat)','Burn (Chemical)',
             'Concussion','Crushing Injury','Cut / Laceration / Puncture','Hernia','Illness',
             'Sprain / Strain','Damage to a Body System','Eye Injury','Hearing Loss','Other'].map(v=>chk('natureOfInjury',v)).join('')}
        </div>
        ${field('Other / Additional Description', inp('natureOther','','Describe if "Other" selected above'), true)}
      </div>

      <div style="margin-bottom:16px">
        <label style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:10px">Body Part(s) Affected — Check all that apply</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 24px">
          <div>
            <div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em">Head & Upper Body</div>
            ${['Head / Skull','Face','Eye(s)','Ear(s)','Nose / Mouth','Neck','Shoulder (Left)','Shoulder (Right)','Arm (Left)','Arm (Right)','Elbow (Left)','Elbow (Right)','Wrist (Left)','Wrist (Right)','Hand (Left)','Hand (Right)','Finger(s) — Left','Finger(s) — Right'].map(v=>chk('bodyParts',v)).join('')}
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em">Torso & Lower Body</div>
            ${['Chest / Ribs','Upper Back','Lower Back','Abdomen','Hip (Left)','Hip (Right)','Leg (Left)','Leg (Right)','Knee (Left)','Knee (Right)','Ankle (Left)','Ankle (Right)','Foot (Left)','Foot (Right)','Toe(s) — Left','Toe(s) — Right','Multiple / Whole Body','Internal Organs'].map(v=>chk('bodyParts',v)).join('')}
          </div>
        </div>
      </div>

      ${sec('Step 2 — Describe the Incident')}
      <div class="form-grid" style="margin-bottom:12px">
        ${field('Exact Location of Incident', inp('inv2Location','','Building, room, specific area, machine…'), true)}
        ${field('Exact Time', inp('inv2Time','time'))}
        ${field('Part of Employee\'s Workday', sel('inv2Workday',['','Entering or Leaving Work','During Normal Work Activities','During Meal Period','During Break','Working Overtime','Other']))}
      </div>

      <div style="margin-bottom:16px">
        <label style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:10px">Attachments</label>
        <div style="display:flex;gap:24px;flex-wrap:wrap">
          <label style="display:flex;align-items:center;gap:7px;font-size:13px;font-weight:400;text-transform:none;letter-spacing:0;cursor:pointer">
            <input type="checkbox" name="attachWitness" ${d.attachWitness?'checked':''} style="width:14px;height:14px;accent-color:var(--amber)"> Written Witness Statements
          </label>
          <label style="display:flex;align-items:center;gap:7px;font-size:13px;font-weight:400;text-transform:none;letter-spacing:0;cursor:pointer">
            <input type="checkbox" name="attachPhotos" ${d.attachPhotos?'checked':''} style="width:14px;height:14px;accent-color:var(--amber)"> Photographs
          </label>
          <label style="display:flex;align-items:center;gap:7px;font-size:13px;font-weight:400;text-transform:none;letter-spacing:0;cursor:pointer">
            <input type="checkbox" name="attachMaps" ${d.attachMaps?'checked':''} style="width:14px;height:14px;accent-color:var(--amber)"> Maps / Drawings
          </label>
        </div>
      </div>

      ${field('Personal Protective Equipment in use (if any)', inp('inv2PPE','','List all PPE being worn at time of incident'), true)}
      ${field('Describe step-by-step the events that led up to the injury. Include names of machines, parts, objects, tools, materials, and other important details.', txt('inv2Description','Full chronological narrative of the incident…',5), true)}

      ${sec('Step 3 — Why Did the Incident Happen?')}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:16px">
        <div>
          <div style="font-size:12px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px"><span>⚠</span> Unsafe Workplace Conditions</div>
          ${['Inadequate Guard','Unguarded Hazard','Safety Device is Defective','Tool or Equipment Defective',
             'Workstation Layout is Hazardous','Unsafe Lighting','Unsafe Ventilation',
             'Lack of Needed PPE','Lack of Appropriate Equipment / Tools','Unsafe Clothing',
             'No Training or Insufficient Training','Other'].map(v=>chk('unsafeConditions',v)).join('')}
        </div>
        <div>
          <div style="font-size:12px;font-weight:800;color:var(--orange);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px"><span>⚡</span> Unsafe Acts by People</div>
          ${['Operating Without Permission','Operating at Unsafe Speed','Servicing Equipment with Power On',
             'Making a Safety Device Inoperative','Using Defective Equipment','Using Equipment in Unapproved Way',
             'Unsafe Lifting','Taking an Unsafe Position or Posture','Distraction / Teasing / Horseplay',
             'Failure to Wear PPE','Failure to Use Available Equipment / Tools','Other'].map(v=>chk('unsafeActs',v)).join('')}
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:4px">
        ${field('Why did the unsafe conditions exist?', txt('whyConditions','Explain root cause of any unsafe conditions identified…',2), true)}
        ${field('Why did the unsafe acts occur?', txt('whyActs','Explain why the unsafe behavior occurred — training gap, pressure, habit, distraction…',2), true)}
      </div>
      <div style="margin-bottom:14px">
        <label style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:8px">Was there a reward that may have encouraged the unsafe conditions or acts? <em style="font-style:normal;font-weight:400">(e.g. "job done more quickly", "product less likely to be damaged")</em></label>
        <div style="display:flex;gap:20px">${radio('rewardFactor','Yes')} ${radio('rewardFactor','No')}</div>
        ${field('If yes — describe', inp('rewardDesc',''), true)}
      </div>
      <div style="display:flex;gap:32px;flex-wrap:wrap;margin-bottom:4px">
        <div><label style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:8px">Were the unsafe acts or conditions reported prior to this incident?</label>
          <div style="display:flex;gap:20px">${radio('priorReported','Yes')} ${radio('priorReported','No')}</div>
        </div>
        <div><label style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:8px">Have there been similar incidents or near misses prior to this one?</label>
          <div style="display:flex;gap:20px">${radio('priorSimilar','Yes')} ${radio('priorSimilar','No')}</div>
        </div>
      </div>

      ${sec('Step 4 — How Can Future Incidents Be Prevented?')}
      <div style="margin-bottom:14px">
        <label style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:10px">What changes do you suggest to prevent recurrence? — Check all that apply</label>
        <div style="display:flex;flex-wrap:wrap">
          ${['Stop This Activity','Guard the Hazard','Train the Employee(s)','Train the Supervisor(s)',
             'Redesign Task Steps','Redesign Work Station','Write a New Policy / Rule',
             'Enforce Existing Policy','Routinely Inspect for the Hazard',
             'Personal Protective Equipment','Other'].map(v=>chk('prevention',v)).join('')}
        </div>
      </div>
      ${field('What should be (or has been) done to carry out the selected suggestion(s)?', txt('preventionDetail','Describe specific actions, assignments, and timelines…',4), true)}

      ${sec('Step 5 — Completion & Review')}
      <div class="form-grid" style="margin-bottom:4px">
        ${field('Written By', inp('writtenBy','','Full name'))}
        ${field('Department', inp('writtenDept',''))}
        ${field('Title', inp('writtenTitle',''))}
        ${field('Date Completed', inp('writtenDate','date'))}
        ${field('Names of Investigation Team Members', inp('teamMembers','','Comma-separated names'), true)}
        ${field('Reviewed By', inp('reviewedBy','','Supervisor or manager name'))}
        ${field('Reviewer Title', inp('reviewerTitle',''))}
        ${field('Review Date', inp('reviewDate','date'))}
      </div>

    </div><!-- end Part 3 card -->

    <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;padding-bottom:24px">
      <button type="button" class="btn btn-secondary" onclick="renderInvestigations()">← Back to List</button>
      <button type="button" class="btn btn-secondary" onclick="printInvestigation()">🖨 Print / Save as PDF</button>
      <button type="button" class="btn btn-secondary" onclick="saveInvestigation('${id}','Draft')">💾 Save Draft</button>
      <button type="button" class="btn btn-primary" onclick="saveInvestigation('${id}','Complete')">✓ Mark Complete & Save</button>
    </div>

    </form>
  </div>`;
}

function saveInvestigation(id, status){
  const form = document.getElementById('inv-form');
  if(!form) return;
  const f = new FormData(form);
  const getAll = k => f.getAll(k);
  const get = k => f.get(k)||'';

  const inv = {
    id, status,
    incidentType: get('incidentType'), empName: get('empName'),
    empJobTitle: get('empJobTitle'), empSupervisor: get('empSupervisor'),
    dateEvent: get('dateEvent')||get('supDateEvent')||get('invDateEvent'),
    timeEvent: get('timeEvent'), toldSupervisor: get('toldSupervisor'),
    witness1: get('witness1'), witness2: get('witness2'),
    witness3: get('witness3'), witness4: get('witness4'),
    empLocation: get('empLocation'), empActivity: get('empActivity'),
    empDescription: get('empDescription'), empPrevention: get('empPrevention'),
    empBodyParts: get('empBodyParts'), empSawDoctor: get('empSawDoctor'),
    empDoctorName: get('empDoctorName'), empDoctorPhone: get('empDoctorPhone'),
    empDoctorDate: get('empDoctorDate'), empDoctorTime: get('empDoctorTime'),
    empPriorInjury: get('empPriorInjury'), empPriorWhen: get('empPriorWhen'),
    empPriorSupervisor: get('empPriorSupervisor'),
    empSignature: get('empSignature'), empSignDate: get('empSignDate'),
    supInjuredName: get('supInjuredName'), supDOB: get('supDOB'),
    supPhone: get('supPhone'), supGender: get('supGender'),
    supAddress: get('supAddress'), supCity: get('supCity'),
    supState: get('supState'), supZip: get('supZip'),
    supBodyPart: get('supBodyPart'), supNatureOfInjury: get('supNatureOfInjury'),
    supHowHappened: get('supHowHappened'), supDateEvent: get('supDateEvent'),
    supTimeEvent: get('supTimeEvent'), supLocation: get('supLocation'),
    supCause: get('supCause'), supSafetyRegs: get('supSafetyRegs'),
    supWentToDoctor: get('supWentToDoctor'), supDoctorName: get('supDoctorName'),
    supHospitalName: get('supHospitalName'), supFacilityAddress: get('supFacilityAddress'),
    supPreventive: get('supPreventive'),
    supSignature: get('supSignature'), supSignDate: get('supSignDate'), supTitle: get('supTitle'),
    reportType: get('reportType'), reportMadeBy: get('reportMadeBy'),
    dept: get('dept'), invDateEvent: get('invDateEvent'),
    inv1Name: get('inv1Name'), inv1Gender: get('inv1Gender'), inv1Age: get('inv1Age'),
    inv1JobTitle: get('inv1JobTitle'), inv1MonthsEmployer: get('inv1MonthsEmployer'),
    inv1MonthsJob: get('inv1MonthsJob'), inv1EmpType: get('inv1EmpType'),
    natureOfInjury: getAll('natureOfInjury'), natureOther: get('natureOther'),
    bodyParts: getAll('bodyParts'),
    inv2Location: get('inv2Location'), inv2Time: get('inv2Time'),
    inv2Workday: get('inv2Workday'), inv2PPE: get('inv2PPE'),
    inv2Description: get('inv2Description'),
    attachWitness: !!form.querySelector('[name=attachWitness]:checked'),
    attachPhotos: !!form.querySelector('[name=attachPhotos]:checked'),
    attachMaps: !!form.querySelector('[name=attachMaps]:checked'),
    unsafeConditions: getAll('unsafeConditions'), unsafeActs: getAll('unsafeActs'),
    whyConditions: get('whyConditions'), whyActs: get('whyActs'),
    rewardFactor: get('rewardFactor'), rewardDesc: get('rewardDesc'),
    priorReported: get('priorReported'), priorSimilar: get('priorSimilar'),
    prevention: getAll('prevention'), preventionDetail: get('preventionDetail'),
    writtenBy: get('writtenBy'), writtenDept: get('writtenDept'),
    writtenTitle: get('writtenTitle'), writtenDate: get('writtenDate'),
    teamMembers: get('teamMembers'), reviewedBy: get('reviewedBy'),
    reviewerTitle: get('reviewerTitle'), reviewDate: get('reviewDate'),
    savedAt: new Date().toISOString()
  };

  const idx = investigations.findIndex(x=>x.id===id);
  if(idx>=0) investigations[idx]=inv; else investigations.unshift(inv);
  STORE.set('investigations',investigations);
  alert(`✓ Investigation ${id} ${status==='Complete'?'completed':'saved as draft'} successfully.`);
  if(status==='Complete') renderInvestigations();
}

function printInvestigation(){
  const prev = document.title;
  document.title = 'CMI Accident & Injury Investigation Report';
  window.print();
  document.title = prev;
}

// ─── Modal helpers ────────────────────────────────────────────────────────────
function showModal(title, body, footer=''){
  closeModal();
  const ov = document.createElement('div');
  ov.className='modal-ov'; ov.id='modal-overlay';
  ov.innerHTML=`<div class="modal">
    <div class="modal-hd"><h3>${title}</h3><button class="close-x" onclick="closeModal()">×</button></div>
    <div class="modal-body">${body}</div>
    ${footer?`<div class="modal-ft">${footer}</div>`:''}
  </div>`;
  ov.addEventListener('click',e=>{ if(e.target===ov) closeModal(); });
  document.body.appendChild(ov);
}
function closeModal(){ document.getElementById('modal-overlay')?.remove(); }

// ─── Utility ──────────────────────────────────────────────────────────────────
function fmtDate(d){ if(!d)return '—'; const dt=new Date(d+'T12:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function capitalize(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : ''; }
function badgeCls(s){ return ({Open:'badge badge-red','Under Review':'badge badge-amber',Closed:'badge badge-green','In Progress':'badge badge-blue','Completed':'badge badge-green','Findings Noted':'badge badge-amber'})[s]||'badge badge-grey'; }

// ─── Init ──────────────────────────────────────────────────────────────────────
updateBadge();
render();
</script>
